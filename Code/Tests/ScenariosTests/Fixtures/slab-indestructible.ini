; Concrete-slab golden: a Harkonnen Tank attacks the tile of an Ordos concrete slab ("Concrete" = the 1x1
; slab), two tiles away, with the explosion VM TICKED (TickExplosions=1). A built concrete plate IS
; destructible — but only by an explosion carrying the TILE_DAMAGE command (Explosion_Func_TileDamage,
; explosion.c:49), which lives on the LARGER explosion types (IMPACT_LARGE / IMPACT_EXPLODE). A tank's
; bullet is EXPLOSION_IMPACT_SMALL, which has no TILE_DAMAGE — so even with explosions ticking, the slab is
; left alone. This golden proves that (the [DUMPTILES] cell stays a slab); the actual slab-revert under a
; TILE_DAMAGE explosion is verified RNG-free by ExplosionTests (the harness can't reliably land a scattering
; rocket on an exact tile, so the destruction itself isn't a scenario golden).
