; House-under-attack golden: a Harkonnen (player) tank ordered to attack an Ordos windtrap.
; On the bullet's impact, Map_MakeExplosion calls Structure_HouseUnderAttack(Ordos) — which flips the
; struck house's one-shot `doneFullScaleAttack` flag (the AI "I've been hit" marker). This is the headless-
; observable half of the base-under-attack alert: the *player-human* branch (timerStructureAttack + the
; "your base is under attack" feedback voice/message) can't run in the oracle's headless harness — its
; Sound_Output_Feedback path SIGSEGVs (no string table loaded) — so it's a UI seam covered by unit tests
; (HouseUnderAttackTests). Ordos is activated via [HOUSES] so the house dump carries its flag per tick.
; Geometry mirrors attack-structure (same Seed/tiles) so the combat trajectory is the same deterministic hit.
[BASIC]
MapScale=1
[HOUSES]
Ordos=1000
[MAP]
Seed=4660
[UNITS]
ID000=Harkonnen,Tank,256,1040,0,Guard
[STRUCTURES]
ID000=Ordos,Windtrap,256,1042
