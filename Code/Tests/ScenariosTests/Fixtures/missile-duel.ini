; Bullet-accounting golden: an Atreides Launcher and an Ordos Launcher five tiles apart, each ordered to
; attack the other (two parity commands). Both are within fireDistance, so they trade notAccurate rockets
; without moving — a sustained mutual duel. Each rocket is a *unit* (Unit_CreateBullet → Unit_Allocate →
; the firing house's unitCount++) removed on impact (Unit_Free → unitCount--), so over the run each house's
; per-tick unitCount oscillates as bullets spawn + land. This asserts the projectile allocate/free
; accounting matches the oracle tick-for-tick — the accounting whose uint16 wrap crashed a long mapview run
; (fix: GameStateTests.unitCountWraps). Both stationary ⇒ no idle wobble ⇒ the RNG/scatter stream aligns.
; Non-player houses (Atreides/Ordos): House_CalculatePowerAndCredit on the *player* house (Harkonnen) takes
; a radar/GUI path the headless parity harness lacks and crashes — so, like `economy`, this avoids it.
; The 7th UNITS field is a seenByHouses bitmask (so each launcher can also target via FindBestTarget).
[BASIC]
MapScale=1
[MAP]
Seed=4660
[HOUSES]
Atreides=1000
Ordos=1000
[UNITS]
ID000=Atreides,Launcher,256,1040,0,Guard,4
ID001=Ordos,Launcher,256,1045,0,Guard,2
