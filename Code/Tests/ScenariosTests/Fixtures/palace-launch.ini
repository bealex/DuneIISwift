; Palace death-hand golden: a Harkonnen (the parity player) palace launches its house missile at a far tile.
; The human one-shot launch — create the off-map carrier (one Tools_Random_256 orientation), re-arm the
; countdown, jitter the target +-160 (Tile_MoveByRandom = two draws), spawn the death-hand bullet from the
; palace — is applied at frame 0 (untraced, before the tick loop, like the oracle's Scen_LaunchMissile). The
; missileHouse bullet is spawned at the palace. Frame 0 only (0 ticks): the bullet's spawn tile + its jittered
; targetAttack (which encodes the 3 launch RNG draws) + the palace's re-armed countDown are matched against the
; oracle. A windtrap keeps the player house's power non-deficit so GameLoop_House stays quiet. The oracle can't
; fly a missileHouse bullet headless (it segfaults in the missile's GUI/sprite path), so the flight isn't
; ticked here — our engine flies it fine (unit tests) and the death-hand blast is covered by §G.
