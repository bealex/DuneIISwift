; Fog-of-war trace golden. A Harkonnen (the parity player) base — a construction yard at 1040 + a soldier
; at 1041 — and four Ordos soldiers at increasing distances east (1042, 1045, 1050) and one far away (2600).
; All units are stationary (Guard), so the only fog change is the player base's reveal at load. The
; [DUMPTILES] track each tile's `veil` (isUnveiled) per tick, so the golden shows exactly which tiles the
; player base reveals — diagnosing "I see all enemy troopers through the fog": if our engine unveils an
; enemy tile the oracle keeps fogged, the golden diverges on `veil` at that tile.
